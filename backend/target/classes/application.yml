spring:
  application:
    name: seating-arrangement-backend
  datasource:
    url: ${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=SeatingArrangement;encrypt=true;trustServerCertificate=true}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:YourStrong!Passw0rd}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}
