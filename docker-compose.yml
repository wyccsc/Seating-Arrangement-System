services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: seating-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd}
    volumes:
      - ./docker/init-db.sql:/init-db.sql:ro
    entrypoint:
      - /bin/bash
      - -c
      - |
        /opt/mssql-tools18/bin/sqlcmd \
          -S sqlserver \
          -U sa \
          -P "$$MSSQL_SA_PASSWORD" \
          -C \
          -i /init-db.sql
    restart: "no"

  backend:
    build:
      context: ./backend
    container_name: seating-backend
    depends_on:
      db-init:
        condition: service_completed_successfully
    environment:
      DB_URL: jdbc:sqlserver://sqlserver:1433;databaseName=SeatingArrangement;encrypt=true;trustServerCertificate=true
      DB_USERNAME: sa
      DB_PASSWORD: ${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd}
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: seating-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  sqlserver-data:
